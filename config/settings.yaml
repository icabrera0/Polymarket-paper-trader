# =====================================================
# Polymarket Paper Trading Bot - Configuration
# =====================================================
# All tuneable configuration for the bot.
# API keys and secrets go in .env, NOT here.
# =====================================================

# ---------------------------------------------------
# Application
# ---------------------------------------------------
app:
  name: "Polymarket Paper Trading Bot"
  version: "0.1.0"
  timezone: "Europe/Madrid"
  base_currency: "EUR"

# ---------------------------------------------------
# Paper trading: virtual balance
# ---------------------------------------------------
paper_trading:
  initial_balance_eur: 150.0
  # EUR→USD conversion rate used by the bot (Polymarket operates in USDC).
  # In production, this will be updated with the real exchange rate.
  eur_to_usd_rate: 1.07

# ---------------------------------------------------
# Risk management (CRITICAL - calibrated for €150)
# ---------------------------------------------------
risk:
  max_position_size_pct: 0.15          # 15% of balance per trade (~€22)
  max_simultaneous_positions: 3
  min_trade_size_eur: 5.0              # Below this, discard
  max_drawdown_pct: 0.30               # 30% loss from INITIAL balance → alert
  stop_loss_pct: 0.20                  # -20% of entry value
  take_profit_pct: 0.30                # +30% to consider closing
  # false → bot never pauses, drawdown is monitoring-only (good for disposable bankroll)
  # true  → bot freezes when drawdown threshold is hit, requires manual resume
  pause_on_drawdown: false
  drawdown_pause_requires_manual_resume: true
  # --- Time-based exits: prevent positions from blocking slots indefinitely ---
  # Tier 1: after 24h, tighten TP to +15% (captures gains that stalled near TP)
  time_tighten_tp_hours: 24
  time_tighten_tp_pct: 0.15
  # Tier 2: after 48h, close immediately if position is in profit (any gain)
  time_exit_profit_hours: 48
  # Tier 3: after 72h, unconditional close (capital recycling, even at loss)
  time_exit_hard_hours: 72

# ---------------------------------------------------
# Market filters (which markets are tradeable)
# ---------------------------------------------------
market_filters:
  min_volume_24h_usd: 10000            # Minimum liquidity
  max_spread_cents: 0.05               # Maximum bid/ask spread
  min_probability_edge: 0.10           # Difference between price and inferred probability
  min_time_to_close_hours: 2           # Markets closing in <2h are discarded
  max_time_to_close_days: 30           # Far-future markets carry too much uncertainty
  exclude_categories: ["Sports", "Esports"]  # Match markets: in-play gap risk kills SL

# ---------------------------------------------------
# News sources
# All 3 are independently toggleable. Enable at least one.
# ---------------------------------------------------
news:
  newsapi:
    enabled: false                     # true requires NEWSAPI_KEY (newsapi.org/register)
    poll_interval_seconds: 300         # Every 5 minutes
    languages: ["en", "es"]
    page_size: 50
    sources:                           # Prioritized sources
      - "reuters"
      - "associated-press"
      - "bloomberg"
      - "bbc-news"
      - "cnn"
  gdelt:
    enabled: true                      # No credentials required
    poll_interval_seconds: 900         # Every 15 minutes
    timespan: "24h"                    # GDELT rejects <1h. 24h gives good context.
    max_records: 100
  telegram:
    enabled: true                     # true requires credentials in .env
    poll_interval_seconds: 60          # Telegram refreshes fast
    message_lookback_minutes: 1440     # 24h by default (aligned with GDELT)
    messages_per_channel: 50
    # Pre-configured public channels. Adjust to your preference.
    # Mix: international agencies, geopolitics, crypto, finance.
    # IMPORTANT: none are 100% official; some are unofficial rebroadcasts
    # not affiliated with the source. Verify each before treating their
    # messages as ground truth.
    channels:
      # --- International agencies and press ---
      - "@ReutersWorldChannel"        # Reuters world (unofficial rebroadcast)
      - "@bbcbreaking"                # BBC Breaking News
      - "@disclosetv"                 # Global events, fast posting
      # --- Geopolitics / conflicts ---
      - "@intelslava"                 # Conflict aggregator (Ukraine, MENA)
      - "@war_monitor"                # Global crisis flashpoints
      - "@geopoliticsworld"           # Daily geopolitical summaries
      - "@WW3INFO"                    # War alerts (biased, verify)
      # --- Crypto / markets ---
      - "@whale_alert_io"             # On-chain whale movements
      - "@CoinDesk"                   # Breaking crypto news (CoinDesk)
      - "@cointelegraph"              # Crypto news and analysis
      - "@binance_announcements"      # Official Binance listings and announcements
      # --- Maps and frontline tracking ---
      - "@UAControlMap"               # Ukraine Control Map – geolocations and frontline
      - "@DeepStateUA"                # DeepState UA – frontline analysis (Ukrainian)
      - "@DeepStateEN"                # DeepState EN – frontline analysis (English)
      - "@liveuamap"                  # Liveuamap – real-time map
      - "@militarylandnet"            # MilitaryLand.net – maps and analysis
      # --- OSINT / military analysis ---
      - "@tatarigami_UA"              # Tatarigami UA – Ukrainian military analysis
      - "@NOELreports"                # NOEL Reports – frontline OSINT reports
      - "@DefMon3war"                 # DefMon3 – unit and frontline tracking
      - "@thedeaddistrict"            # The Dead District – military analysis
      - "@ELINTNews"                  # ELINT News – signals intelligence
      - "@Osinttechnical"             # OSINTtechnical – military technical analysis
      - "@wartranslated"              # WarTranslated – translations of Russian sources
      - "@emilkastehelmi"             # Emil Kastehelmi – OSINT analysis
      - "@Tendar"                     # Tendar – frontline tracking
      # --- Media / journalism ---
      - "@kyivindependent"            # The Kyiv Independent – Ukrainian press
      - "@IAPonomarenko"              # Illia Ponomarenko – defence correspondent
      - "@christogrozev"              # Christo Grozev – Bellingcat investigations
      # --- Think tanks / strategic analysis ---
      - "@TheStudyofWar"              # Institute for the Study of War (ISW)
      # --- Russian sources (verify bias) ---
      - "@GirkinGirkin"               # Igor Girkin – Russian military figure (biased, verify)
      # --- Field / Ukraine ---
      - "@bayraktar_1love"            # Special Kherson Cat – field reports
      # ---------------------------------------------------------------
      # SPORTS — live news and injuries (added for sports_in_play)
      # ---------------------------------------------------------------
      # --- General sports news ---
      - "@FabrizioRomano"             # Romano – football transfers and injuries (very reliable)
      - "@BleacherReport"             # Bleacher Report – multi-sport news
      - "@footballtalkk"              # Football Talk – football news
      # --- Cricket ---
      - "@CricketBuzzOfficial"        # Cricket Buzz – IPL/T20 news and scores
      - "@CricketUpdatesLive"         # Live cricket scores and updates
      # ---------------------------------------------------------------
      # SPORTS PREDICTIONS — tipsters and analysis (verify bias)
      # These channels publish picks and analysis that the LLM can use as
      # consensus signals. They are not 100% accurate; cross-check with other sources.
      # ---------------------------------------------------------------
      - "@BettingTipsChannel"         # Tips channel with reasoning
      - "@PredictionsFootball"        # Football match analysis
      - "@CricketPredictions"         # Cricket tips IPL/Test/T20
      - "@TennisPredictions"          # ATP/WTA predictions with odds
  cache_ttl_seconds: 3600              # 1 hour
  dedup_similarity_threshold: 0.85     # Fuzzy match to detect duplicates

# ---------------------------------------------------
# LLM (sentiment analysis provider)
#
# Two supported options:
#
#   provider: "ollama"     → LOCAL, free, no external network.
#                            Requires Ollama installed and model downloaded.
#                            Recommended for continuous use.
#
#   provider: "anthropic"  → Claude API. Better quality but COSTS MONEY
#                            (credits at console.anthropic.com, NOT Pro/Max).
#                            Useful if you need very precise probability
#                            calibration or if Ollama doesn't perform well on your PC.
#
# For this config (Ollama + qwen2.5 7B):
#   1. Install Ollama: https://ollama.com/download
#   2. ollama pull qwen2.5:7b-instruct-q4_K_M
#   3. ollama serve  (usually already running as a background service)
# ---------------------------------------------------
llm:
  provider: "ollama"

  # Model. For Ollama: qwen2.5:7b-instruct-q4_K_M (recommended for 8GB VRAM)
  # For Anthropic: claude-haiku-4-5 (cheaper) or claude-sonnet-4-6
  model: "qwen2.5:7b-instruct-q4_K_M"

  max_tokens: 2048
  temperature: 0.2                     # Low for consistent analysis
  retry_attempts: 3
  retry_delay_seconds: 5
  min_confidence_threshold: 60         # Minimum LLM confidence % to consider the decision
  cache_analysis: true
  cache_ttl_seconds: 1800              # Re-analyze markets at most every 30 min

  # ----- Anthropic only -----
  # Daily cap in USD. If accumulated calls today exceed this limit,
  # SENTIMENT_ANALYZER stops calling the LLM until the reset (00:00 UTC).
  daily_spend_limit_usd: 5.0

  # "Dry run" mode: does not call the LLM, only logs. Useful for estimating cost.
  dry_run: false

  # ----- Ollama only -----
  ollama_base_url: "http://localhost:11434"
  ollama_timeout_seconds: 180          # Local models can be slow; no retry on timeout
  # Parallel workers for LLM analysis (dashboard slider overrides this at runtime).
  # >1 requires: set OLLAMA_NUM_PARALLEL=<N> env var before starting Ollama.
  llm_parallelism: 1

# ---------------------------------------------------
# Polymarket (endpoints and polling)
# ---------------------------------------------------
polymarket:
  gamma_api_url: "https://gamma-api.polymarket.com"
  clob_api_url: "https://clob.polymarket.com"
  scan_interval_seconds: 300           # Market scan every 5 min
  request_timeout_seconds: 30
  # Fees — Polymarket currently charges 0% but parameterised in case it changes
  trading_fee_pct: 0.0
  # Simulated slippage in paper trading (% of entry price)
  simulated_slippage_pct: 0.005        # 0.5%

# ---------------------------------------------------
# Decision engine
# ---------------------------------------------------
decision:
  llm_consultation_threshold: 0.08     # Edge > 8% → consult LLM
  require_news_for_entry: true         # Do not open without a supporting news item
  reevaluate_open_positions_minutes: 15

  # =====================================================
  # MARKET COVERAGE (analysis-coverage)
  # =====================================================
  # How many markets to attempt to analyze per cycle (more → more opportunities
  # but also more token cost if using Anthropic).
  markets_to_analyze_per_cycle: 15

  # Re-ranking by category: categories with high media coverage
  # are prioritized over esports / niche sports. Markets with no category
  # keep their position.
  category_priority_boost:
    Politics: 1.5
    Geopolitics: 1.5
    Crypto: 1.4
    Tech: 1.3
    Business: 1.3
    Sports: 0.8                        # Low coverage in regional markets
    Esports: 0.4                       # Almost nonexistent in GDELT

  # =====================================================
  # FALLBACK: broaden search when there is no fresh news
  # =====================================================
  # If the 24h search returns no news, retry with an extended timespan
  # to have at least some context.
  fallback_news_lookback: "7d"
  enable_fallback_search: true

  # =====================================================
  # LOW-INFO TRADES (cautious mode)
  # =====================================================
  # Allow trades with <2 relevant news items. If allowed:
  # - Sizing reduced by low_info_size_multiplier
  # - Minimum confidence RAISED (stricter LLM requirement)
  # Maintains risk discipline while expanding coverage.
  allow_low_info_trades: true
  low_info_min_confidence: 75          # vs 60 normal
  low_info_size_multiplier: 0.5        # 50% of the usual dynamic sizing
  low_info_min_articles: 1             # Accepts analysis with 1+ news item

  # =====================================================
  # NO-OPPORTUNITY HUNT
  # =====================================================
  # After selecting main candidates by volume/category, also add markets
  # where YES is priced high (>= no_hunt_min_yes_price). These are prime
  # COMPRAR_NO candidates: a market priced YES=0.80 only needs to drop to
  # YES=0.70 for NO buyers to earn +50% on their position.
  no_hunt_enabled: true
  no_hunt_min_yes_price: 0.65          # Markets with YES >= 65% → potential NO edge
  no_hunt_max_candidates: 3            # Extra markets per cycle (on top of main scan)

# ---------------------------------------------------
# Sports In-Play (secondary module, opt-in)
# ---------------------------------------------------
# Live match markets: asymmetric bets on the underdog (BUY_NO only).
# Fixed small size — treat as speculative lottery tickets.
# Requires enabled: true to activate. Completely separate from the main flow.
# ---------------------------------------------------
sports_in_play:
  enabled: true                         # Change to true to activate
  max_positions: 1                       # Only 1 simultaneous sports position
  position_size_eur: 3.0                 # Fixed size. Never dynamic.
  min_yes_price: 0.68                    # Only enter if the favourite is at ≥68%
  max_yes_price: 0.88                    # Above 88% the underdog is too extreme
  max_time_to_close_hours: 4.0           # Only in-progress matches or with <4h remaining
  min_volume_24h_usd: 5000               # Minimum liquidity for sports
  min_fresh_news_minutes: 60             # Requires news <60min about the match
  min_confidence: 65                     # Minimum LLM threshold (hard ceiling of the prompt)
  stop_loss_pct: 0.50                    # SL at -50% (wider to absorb swings)
  take_profit_pct: 0.80                  # TP at +80% (exit before market closes)
  scan_categories: ["Sports", "Esports"] # Categories to scan

# ---------------------------------------------------
# Excel reports
# ---------------------------------------------------
reports:
  output_directory: "reports"
  filename_format: "%Y-%m-%d_report.xlsx"
  generation_time: "23:55"             # Local time (Europe/Madrid)
  include_charts: true
  conditional_formatting: true         # Green P&L+, red P&L-

# ---------------------------------------------------
# Logging
# ---------------------------------------------------
logging:
  level: "INFO"                        # DEBUG, INFO, WARNING, ERROR
  log_directory: "logs"
  rotation_size_mb: 50
  retention_days: 30
  log_llm_decisions: true              # Each LLM decision is logged in full
  log_format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} - {message}"

# ---------------------------------------------------
# Database (SQLite)
# ---------------------------------------------------
database:
  type: "sqlite"
  path: "data/polymarket_bot.db"
  # Tables to be created: trades, news_events, market_snapshots, llm_decisions, balance_history

# ---------------------------------------------------
# Discord notifications
# ---------------------------------------------------
notifications:
  discord:
    enabled: true
    username: "PolymarketBot"
    avatar_url: ""                     # Optional avatar URL
    notify_on_trade_open: true
    notify_on_trade_close: true
    notify_on_stop_loss: true
    notify_on_take_profit: true
    notify_on_drawdown_warning: true
    notify_on_bot_pause: true
    notify_daily_summary: true
    daily_summary_time: "23:59"
    # Embed colors (decimal)
    color_profit: 3066993              # Green
    color_loss: 15158332               # Red
    color_info: 3447003                # Blue
    color_warning: 16776960            # Yellow
